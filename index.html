<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Book Club Voting Board 📚</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 850px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 { text-align: center; }

        button {
            padding: 8px 12px;
            cursor: pointer;
            margin-bottom: 10px;
            margin-right: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .entry {
            border: 1px solid #ddd;
            padding: 12px;
            margin-bottom: 10px;
        }

        .meta {
            font-size: 12px;
            color: gray;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta img {
            width: 18px;
            height: 18px;
            border-radius: 50%;
        }

        .votes {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: flex-end;
        }

        .score {
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        #userBox {
            margin-bottom: 10px;
        }

        .comments {
            margin-top: 10px;
            padding-left: 10px;
            border-left: 2px solid #eee;
        }

        .comment {
            font-size: 13px;
            margin-bottom: 8px;
        }

        .comment-meta {
            font-size: 11px;
            color: gray;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .comment-meta img {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        .hidden {
            display: none;
        }

        .balloon {
            position: fixed;
            bottom: -100px;
            width: 60px;
            height: 80px;
            border-radius: 50%;
            opacity: 0.9;
            animation: floatUp 3s ease-in forwards;
            z-index: 9999;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(-110vh);
                opacity: 0;
            }
        }

        .entry-spotlight {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;

            background:
                    radial-gradient(circle at 20% 80%,
                    rgba(255, 0, 128, 0.45) 0%,
                    transparent 40%),
                    radial-gradient(circle at 80% 20%,
                    rgba(0, 200, 255, 0.40) 0%,
                    transparent 40%),
                    radial-gradient(circle at 50% 50%,
                    rgba(255, 215, 0, 0.35) 0%,
                    transparent 45%),
                    radial-gradient(circle at 30% 30%,
                    rgba(128, 0, 255, 0.30) 0%,
                    transparent 40%);

            animation: spotlightFlash 2.5s ease-out forwards;
        }

        @keyframes spotlightFlash {
            0% {
                opacity: 0;
                transform: scale(0.95);
                filter: blur(40px);
            }

            15% {
                opacity: 1;
            }

            70% {
                opacity: 0.9;
            }

            100% {
                opacity: 0;
                transform: scale(1.08);
                filter: blur(80px);
            }
        }
    </style>
</head>

<body>

<h1>Book Club Voting Board 📚</h1>

<button id="loginBtn">Sign in with Google</button>
<button id="logoutBtn" style="display:none;">Sign out</button>

<div id="userBox"></div>

<input id="entryInput" placeholder="Add new idea..." />
<button onclick="addEntry()">Add Entry</button>

<input id="searchInput" placeholder="Search..." oninput="render()" />

<div id="entries"></div>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import {
        getFirestore,
        collection,
        addDoc,
        query,
        orderBy,
        onSnapshot,
        doc,
        runTransaction,
        deleteDoc,
        onSnapshot as fsOnSnapshot
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

    import {
        getAuth,
        GoogleAuthProvider,
        signInWithPopup,
        onAuthStateChanged,
        signOut
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    /* 🔥 FIREBASE CONFIG */
    const firebaseConfig = {
        apiKey: "AIzaSyA6FO-xhSGoa1hhFx9RRkI5hQm2GEBwWTA",
        authDomain: "book-club-57a38.firebaseapp.com",
        projectId: "book-club-57a38",
        storageBucket: "book-club-57a38.firebasestorage.app",
        messagingSenderId: "418596540446",
        appId: "1:418596540446:web:a0ebc2506a5bae7fbb5e0f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const entriesRef = collection(db, "entries");

    let entries = [];
    let user = null;

    document.getElementById("loginBtn").onclick = async () => {
        try {
            await signInWithPopup(auth, provider);
            location.reload();
        } catch (e) {
            console.error(e);
            alert("Login failed");
        }
    };

    document.getElementById("logoutBtn").onclick = async () => {
        try {
            await signOut(auth);
            location.reload();
        } catch (e) {
            console.error(e);
            alert("Logout failed");
        }
    };

    onAuthStateChanged(auth, (u) => {

        if (u) {
            user = {
                uid: u.uid,
                name: u.displayName,
                photo: u.photoURL
            };

            document.getElementById("userBox").innerHTML = `
            <div style="display:flex;align-items:center;gap:10px;">
                <img src="${user.photo}" width="28" style="border-radius:50%">
                <span>Signed in as <b>${user.name}</b></span>
            </div>
        `;

            document.getElementById("logoutBtn").style.display = "inline-block";
        } else {
            user = null;
            document.getElementById("userBox").innerHTML = "";
            document.getElementById("logoutBtn").style.display = "none";
        }

        startApp();
    });

    let started = false;
    function startApp() {
        if (started) return;
        started = true;

        onSnapshot(query(entriesRef, orderBy("score", "desc")), (snap) => {
            entries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
        });
    }

    window.addEntry = async function () {
        if (!user) return alert("Please sign in first");

        const input = document.getElementById("entryInput");
        const text = input.value.trim();
        if (!text) return;

        const duplicate = entries.some(
            e => e.text.toLowerCase().trim() === text.toLowerCase().trim()
        );

        if (duplicate) return alert("Duplicate entry not allowed");

        await addDoc(entriesRef, {
            text,
            score: 0,
            createdAt: Date.now(),
            createdBy: {
                uid: user.uid,
                name: user.name,
                photo: user.photo
            }
        });

        showSpotlight();

        input.value = "";
    };

    function showSpotlight() {
        const light = document.createElement("div");

        light.className = "entry-spotlight";

        document.body.appendChild(light);

        setTimeout(() => {
            light.remove();
        }, 2500);
    }

    window.vote = async function (entryId, delta) {
        if (!user) return;

        const voteId = `${entryId}_${user.uid}`;
        const voteRef = doc(db, "votes", voteId);
        const entryRef = doc(db, "entries", entryId);

        await runTransaction(db, async (tx) => {
            const voteSnap = await tx.get(voteRef);
            const entrySnap = await tx.get(entryRef);

            if (!entrySnap.exists()) return;

            const currentScore = entrySnap.data().score || 0;
            if (currentScore === 0 && delta < 0) return;

            let userVotes = delta;
            if (voteSnap.exists()) {
                if (user.name.toString().toLowerCase().includes("anna") || voteSnap.data().value !== delta) {
                    userVotes += voteSnap.data().value;
                    if (delta > 0) {
                        confetti({
                            particleCount: 200,
                            spread: 90,
                            origin: { y: 0.6 }
                        });
                    }
                }
                else {
                    delta = 0;
                }
            }

            tx.set(voteRef, {
                entryId,
                userId: user.uid,
                value: userVotes
            });

            tx.update(entryRef, {
                score: currentScore + delta
            });
        });
    };

    window.deleteEntry = async function (entryId, ownerUid) {
        if (!user) return;
        if (user.uid !== ownerUid) return alert("You can only delete your own entries.");
        await deleteDoc(doc(db, "entries", entryId));
    };

    const commentListeners = {};

    window.toggleComments = function (entryId) {
        const box = document.getElementById(`comments-${entryId}`);

        const isOpen = !box.classList.contains("hidden");

        if (isOpen) {
            box.classList.add("hidden");
            if (commentListeners[entryId]) {
                commentListeners[entryId]();
                delete commentListeners[entryId];
            }
            return;
        }

        box.classList.remove("hidden");

        box.innerHTML = `
        <div id="list-${entryId}">Loading comments...</div>

        ${user ? `
            <input id="comment-${entryId}"
       placeholder="Write a comment..."
       onkeydown="handleCommentKey(event, '${entryId}')" />

            <button onclick="addComment('${entryId}')">Post</button>
        ` : `<i>Login to comment</i>`}
    `;

        const listDiv = document.getElementById(`list-${entryId}`);

        const commentsRef = collection(db, "entries", entryId, "comments");

        if (commentListeners[entryId]) {
            return;
        }

        const unsubscribe = fsOnSnapshot(
            query(commentsRef, orderBy("createdAt", "asc")),
            (snap) => {
                listDiv.innerHTML = snap.docs.map(d => {
                    const c = d.data();
                    return `
    <div class="comment">
        <div class="comment-meta">
            ${c.createdBy?.photo ? `<img src="${c.createdBy.photo}">` : ""}
            <b>${c.createdBy?.name || "unknown"}</b>

            ${
                        user && c.createdBy?.uid === user.uid
                            ? `<button onclick="deleteComment('${entryId}', '${d.id}')"
                               style="margin-left:auto;color:red;">
                          🗑️
                       </button>`
                            : ""
                    }
        </div>

        <div>${escapeHtml(c.text)}</div>
    </div>
`;;
                }).join("") || `<i>No comments yet</i>`;
            }
        );

        commentListeners[entryId] = unsubscribe;
    };

    window.handleCommentKey = function (event, entryId) {
        if (event.key === "Enter") {
            event.preventDefault();
            addComment(entryId);
        }
    };

    window.deleteComment = async function (entryId, commentId) {
        if (!user) return;

        const ref = doc(db, "entries", entryId, "comments", commentId);

        try {
            await deleteDoc(ref);
        } catch (e) {
            console.error(e);
            alert("You cannot delete this comment.");
        }
    };

    window.addComment = async function (entryId) {
        if (!user) return;

        const input = document.getElementById(`comment-${entryId}`);
        const text = input.value.trim();
        if (!text) return;

        const commentsRef = collection(db, "entries", entryId, "comments");

        await addDoc(commentsRef, {
            text,
            createdAt: Date.now(),
            createdBy: user
        });

        spawnBalloons(25);

        input.value = "";
    };

    function spawnBalloons(count = 8) {
        const colors = ["#ff4d6d", "#4dabf7", "#51cf66", "#ffd43b", "#845ef7"];

        for (let i = 0; i < count; i++) {
            const balloon = document.createElement("div");

            balloon.className = "balloon";
            balloon.style.left = Math.random() * 100 + "vw";
            balloon.style.background = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.animationDuration = (2.5 + Math.random() * 1.5) + "s";

            document.body.appendChild(balloon);

            setTimeout(() => {
                balloon.remove();
            }, 4000);
        }
    }

    window.render = function () {
        const q = document.getElementById("searchInput").value.toLowerCase();

        const filtered = entries.filter(e =>
            e.text.toLowerCase().includes(q)
        );

        document.getElementById("entries").innerHTML = filtered.map(e => `
        <div class="entry">
            <div>
                <b>${escapeHtml(e.text)}</b>

                <div class="meta">
                    ${e.createdBy?.photo ? `<img src="${e.createdBy.photo}">` : ""}
                    added by ${e.createdBy?.name || "unknown"}
                </div>

                <button onclick="toggleComments('${e.id}')">
                    💬 Comments
                </button>

                <div id="comments-${e.id}" class="comments hidden"></div>
            </div>

            <div class="votes">
                <button onclick="vote('${e.id}', 1)">👍</button>
                <div class="score">${e.score || 0}</div>
                <button onclick="vote('${e.id}', -1)">👎</button>

                ${
            user && e.createdBy?.uid === user.uid
                ? `<button onclick="deleteEntry('${e.id}', '${e.createdBy.uid}')" style="color:red;">🗑️</button>`
                : ""
        }
            </div>
        </div>
    `).join("");
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
    }

</script>

</body>
</html>
